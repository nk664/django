<!DOCTYPE html>
<html lang="en">

<head>
    <title>Update Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="flex justify-center items-center h-screen">

        <div class="bg-white shadow-lg rounded-lg p-8 w-96">

            <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
                Update Student
            </h2>

            <form method="POST">
                {% csrf_token %}

                <!-- Name -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold">
                        Name
                    </label>

                    <input type="text" name="name" value="{{student.name}}"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold">
                        Email
                    </label>

                    <input type="email" name="email" value="{{student.email}}"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- Phone -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold">
                        Phone Number
                    </label>

                    <input type="text" name="phone_number" value="{{student.phone_number}}"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- Status -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold">
                        Status
                    </label>

                    <select name="status" class="w-full border rounded-lg px-3 py-2 mt-1">

                        <option value="Active" {% if student.status == "Active" %}selected{% endif %}>
                            Active
                        </option>

                        <option value="Inactive" {% if student.status == "Inactive" %}selected{% endif %}>
                            Inactive
                        </option>

                    </select>

                </div>

                <!-- Button -->
                <div class="flex justify-between">

                    <a href="{% url 'student_home' %}"
                        class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                        Back
                    </a>

                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        Update
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
