<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">

    <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-700">Student Management</h1>

            <a href="{% url 'add_student'%}" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600">
                + Add Student
            </a>
        </div>

        <!-- Student Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            {% for student in students %}

            <div class="bg-white shadow-lg rounded-xl p-6 hover:shadow-xl transition">

                <h2 class="text-xl font-bold text-gray-700 mb-2">
                    {{ student.name }}
                </h2>

                <p class="text-gray-600">
                    📧 {{student.email }}
                </p>

                <p class="text-gray-600 mb-4">
                    📱 {{ student.phone_number }}
                </p>

                <div class="flex gap-3">

                    <a href="{% url 'update_student' student.id%}"
                        class="bg-yellow-400 text-white px-3 py-1 rounded hover:bg-yellow-500">
                        Update
                    </a>

                    <a href=" {% url 'delete_student' student.id%}"
                        class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                        Delete
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
